<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMI Compression - Working Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; background: #f8fafc; }
        h1 { color: #2563eb; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; min-height: 120px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; }
        textarea:focus { outline: none; border-color: #2563eb; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        button:hover { background: #1d4ed8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .results { margin-top: 25px; padding: 20px; background: #f1f5f9; border-radius: 8px; display: none; }
        .results.show { display: block; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat { text-align: center; }
        .stat-value { font-size: 28px; font-weight: 800; color: #2563eb; }
        .stat-label { font-size: 12px; color: #64748b; margin-top: 5px; }
        .output-box { background: #0f172a; color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; word-wrap: break-word; }
        .error { color: #ef4444; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗜️ PMI Compression Demo</h1>
        <p>Enter a prompt below and see how PMI compresses it while preserving meaning.</p>
        
        <textarea id="input" placeholder="Enter your prompt here...">I need you to analyze this quarterly sales report and provide a comprehensive breakdown of the performance metrics. Please look at the revenue figures, compare them to last quarter, identify any trends or patterns, and suggest three specific actionable recommendations for improving sales in the next quarter.</textarea>
        
        <button onclick="compress()" id="btn">⚡ Compress Prompt</button>
        <div id="error" class="error"></div>
        
        <div id="results" class="results">
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="orig-tokens">0</div>
                    <div class="stat-label">Original Tokens</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="comp-tokens">0</div>
                    <div class="stat-label">Compressed Tokens</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="saved">0</div>
                    <div class="stat-label">Tokens Saved</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="ratio">0%</div>
                    <div class="stat-label">Compression</div>
                </div>
            </div>
            
            <h3>Compressed Result:</h3>
            <div class="output-box" id="output"></div>
        </div>
    </div>

    <script>
        // PMI Compression Algorithm
        function compress() {
            const btn = document.getElementById('btn');
            const errorDiv = document.getElementById('error');
            const input = document.getElementById('input').value;
            
            errorDiv.textContent = '';
            
            if (!input.trim()) {
                errorDiv.textContent = 'Please enter a prompt to compress';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ Compressing...';
            
            try {
                // Run compression
                const compressed = pmiCompress(input);
                
                // Calculate stats
                const originalTokens = Math.ceil(input.length / 4);
                const compressedTokens = Math.ceil(compressed.length / 4);
                const saved = originalTokens - compressedTokens;
                const ratio = Math.round((saved / originalTokens) * 100);
                
                // Display results
                document.getElementById('orig-tokens').textContent = originalTokens;
                document.getElementById('comp-tokens').textContent = compressedTokens;
                document.getElementById('saved').textContent = saved;
                document.getElementById('ratio').textContent = ratio + '%';
                document.getElementById('output').textContent = compressed;
                document.getElementById('results').classList.add('show');
                
            } catch (e) {
                errorDiv.textContent = 'Error: ' + e.message;
                console.error(e);
            }
            
            btn.disabled = false;
            btn.textContent = '⚡ Compress Prompt';
        }
        
        function pmiCompress(text) {
            let result = text;
            
            // Pattern replacements
            const patterns = [
                [/\bI need you to\b/gi, ''],
                [/\bCan you please\b/gi, ''],
                [/\bCould you please\b/gi, ''],
                [/\bI would like to\b/gi, ''],
                [/\bI want to\b/gi, ''],
                [/\bin order to\b/gi, 'to'],
                [/\bdue to the fact that\b/gi, 'because'],
                [/\bin the event that\b/gi, 'if'],
                [/\bat this point in time\b/gi, 'now'],
                [/\bfor the purpose of\b/gi, 'for'],
                [/\bit is important to note that\b/gi, ''],
                [/\bplease\b/gi, ''],
                [/\bcomprehensive\b/gi, ''],
                [/\bdetailed\b/gi, ''],
                [/\bthorough\b/gi, ''],
                [/\bspecific\b/gi, ''],
                [/\bthe\b/gi, ''],
                [/\ba\b/gi, ''],
                [/\ban\b/gi, '']
            ];
            
            patterns.forEach(([pattern, replacement]) => {
                result = result.replace(pattern, replacement);
            });
            
            // Clean up whitespace
            result = result.replace(/\s+/g, ' ').trim();
            
            // Remove leading/trailing punctuation
            result = result.replace(/^[\s,]+|[\s,]+$/g, '');
            
            return result;
        }
    </script>
</body>
</html>
