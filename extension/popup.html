<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMI - AI Cost Optimizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
    }
    
    .header {
      background: linear-gradient(135deg, #00e8d0 0%, #0ea5e9 100%);
      padding: 20px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #0a0e1a;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      color: rgba(10, 14, 26, 0.8);
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #00e8d0;
    }
    
    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .content {
      padding: 16px;
    }
    
    .section {
      margin-bottom: 20px;
    }
    
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #00e8d0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .toggle-label {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .toggle-label span {
      font-size: 16px;
    }
    
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .toggle-switch.active {
      background: #00e8d0;
    }
    
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    
    .toggle-switch.active::after {
      transform: translateX(20px);
    }
    
    .api-key-section {
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
    }
    
    .api-key-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 12px;
    }
    
    .api-key-input::placeholder {
      color: #64748b;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00e8d0 0%, #0ea5e9 100%);
      border: none;
      border-radius: 6px;
      color: #0a0e1a;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .btn:hover {
      opacity: 0.9;
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }
    
    .footer {
      padding: 12px 16px;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .footer a {
      color: #00e8d0;
      text-decoration: none;
      font-size: 12px;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: rgba(0, 232, 208, 0.1);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: #00e8d0;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status-text {
      font-size: 13px;
      color: #00e8d0;
    }
    
    .compression-preview {
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      margin-top: 12px;
    }
    
    .preview-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 8px;
    }
    
    .preview-label {
      color: #94a3b8;
    }
    
    .preview-value {
      color: #00e8d0;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>PMI</h1>
    <p>AI Cost Optimizer</p>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="tokens-saved">0</div>
      <div class="stat-label">Tokens Saved</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="cost-saved">$0</div>
      <div class="stat-label">Cost Saved</div>
    </div>
  </div>
  
  <div class="content">
    <div class="status">
      <div class="status-dot"></div>
      <div class="status-text">PMI is active on this page</div>
    </div>
    
    <div class="section">
      <div class="section-title">Compression Features</div>
      
      <div class="toggle-row">
        <div class="toggle-label">
          <span>🗜️</span>
          Text Compression
        </div>
        <div class="toggle-switch active" id="toggle-compression"></div>
      </div>
      
      <div class="toggle-row">
        <div class="toggle-label">
          <span>📦</span>
          Object Memory
        </div>
        <div class="toggle-switch active" id="toggle-objects"></div>
      </div>
      
      <div class="toggle-row">
        <div class="toggle-label">
          <span>💾</span>
          Prefix Caching
        </div>
        <div class="toggle-switch active" id="toggle-cache"></div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">API Configuration</div>
      <div class="api-key-section">
        <input 
          type="password" 
          class="api-key-input" 
          id="api-key"
          placeholder="Enter your PMI API key"
        >
        <button class="btn" id="save-key">Save API Key</button>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">Last Compression</div>
      <div class="compression-preview" id="last-compression">
        <div class="preview-row">
          <span class="preview-label">Original:</span>
          <span class="preview-value" id="original-tokens">-</span>
        </div>
        <div class="preview-row">
          <span class="preview-label">Compressed:</span>
          <span class="preview-value" id="compressed-tokens">-</span>
        </div>
        <div class="preview-row">
          <span class="preview-label">Savings:</span>
          <span class="preview-value" id="savings-percent">-</span>
        </div>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <a href="https://blueprintlabs.live/dashboard" target="_blank">Open Dashboard →</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
